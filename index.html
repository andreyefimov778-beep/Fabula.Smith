<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA ACADEMY | Система Обучения</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900" 
      x-data="{ 
        view: 'home', 
        currentCourse: '', 
        activeLesson: 'Введение',
        courses: {
            'Нейросети': ['Основы ChatGPT', 'Генерация изображений в Midjourney', 'Автоматизация контента', 'Создание ИИ-агентов'],
            'Дизайн': ['Основы композиции', 'Работа с цветом и сетками', 'Проектирование в Figma', 'Создание дизайн-системы'],
            'Кодинг': ['Структура HTML5', 'Стилизация CSS3', 'Логика JavaScript', 'Деплой на Vercel']
        }
      }">

    <nav class="fixed w-full z-50 glass border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" @click="view = 'home'">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">α</div>
                <span class="text-xl font-extrabold tracking-tight">ALPHA<span class="text-indigo-600">.EDU</span></span>
            </div>
            <button @click="view = 'home'" class="text-sm font-bold text-slate-500 hover:text-indigo-600 transition" x-show="view !== 'home'">← На главную</button>
        </div>
    </nav>

    <main x-show="view === 'home'" x-transition class="pt-32 pb-20 px-6">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-12 text-center">Выберите <span class="text-indigo-600">курс</span></h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <template x-for="(lessons, name) in courses" :key="name">
                    <div class="bg-white border border-slate-100 rounded-3xl p-8 shadow-sm hover:shadow-xl transition group">
                        <h3 class="text-2xl font-bold mb-4" x-text="name"></h3>
                        <p class="text-slate-500 mb-6 text-sm" x-text="'Всего ' + lessons.length + ' уроков в программе'"></p>
                        <button @click="view = 'lesson'; currentCourse = name; activeLesson = lessons[0]" 
                                class="w-full py-4 rounded-xl bg-indigo-50 text-indigo-600 font-bold group-hover:bg-indigo-600 group-hover:text-white transition">
                            Открыть уроки
                        </button>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <main x-show="view === 'lesson'" x-transition class="pt-24 pb-20 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="mb-8">
                <h2 class="text-sm font-bold text-indigo-600 uppercase tracking-widest mb-2" x-text="currentCourse"></h2>
                <h1 class="text-3xl font-black" x-text="activeLesson"></h1>
            </div>

            <div class="flex flex-col lg:flex-row gap-8">
                <div class="lg:w-2/3">
                    <div class="aspect-video bg-slate-900 rounded-3xl shadow-2xl flex items-center justify-center border-4 border-white overflow-hidden relative">
                        <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/10 to-transparent"></div>
                        <div class="text-center px-6">
                            <div class="w-20 h-20 bg-indigo-600 rounded-full mx-auto flex items-center justify-center mb-4 cursor-pointer hover:scale-110 transition">
                                <svg class="w-8 h-8 text-white fill-current" viewBox="0 0 20 20"><path d="M4.5 2.691l12 7.309-12 7.309V2.691z"/></svg>
                            </div>
                            <p class="text-white/60 font-medium">Видео урока «<span x-text="activeLesson"></span>» скоро появится</p>
                        </div>
                    </div>
                    
                    <div class="mt-8 bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                        <h4 class="font-bold text-lg mb-4">Описание занятия</h4>
                        <p class="text-slate-600 leading-relaxed">В этом видео мы подробно изучим тему: <strong x-text="activeLesson"></strong>. Подготовьте блокноты, после просмотра вас ждет практическое задание.</p>
                    </div>
                </div>
                
                <div class="lg:w-1/3">
                    <div class="bg-white border border-slate-100 rounded-3xl p-6 shadow-sm sticky top-24">
                        <h3 class="font-bold text-xl mb-6 flex items-center">
                            <svg class="w-5 h-5 mr-2 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2" stroke-linecap="round"/></svg>
                            Программа курса
                        </h3>
                        
                        <div class="space-y-3">
                            <template x-for="(lesson, index) in courses[currentCourse]" :key="index">
                                <div @click="activeLesson = lesson" 
                                     :class="activeLesson === lesson ? 'bg-indigo-600 text-white shadow-indigo-200' : 'bg-slate-50 text-slate-700 hover:bg-slate-100'"
                                     class="flex items-center p-4 rounded-2xl cursor-pointer transition shadow-sm border border-transparent">
                                    <div :class="activeLesson === lesson ? 'bg-white/20' : 'bg-indigo-100 text-indigo-600'" 
                                         class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold mr-4" 
                                         x-text="index + 1"></div>
                                    <span class="text-sm font-bold flex-1" x-text="lesson"></span>
                                    <template x-if="activeLesson === lesson">
                                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/></svg>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-100 py-10 mt-20">
        <div class="max-w-7xl mx-auto px-6 text-center text-slate-400 text-xs">
            © 2026 ALPHA ACADEMY. Глобальная образовательная экосистема.
        </div>
    </footer>

</body>
</html>
