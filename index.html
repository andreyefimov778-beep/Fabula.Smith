<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA FORUM | PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        [x-cloak] { display: none !important; }
        .forum-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e2e8f0; }
        .forum-card:hover { transform: translateY(-4px); border-color: #4f46e5; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body x-data="forumSystem()" x-init="initApp()">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" @click="view = 'list'">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200 text-white font-black text-xl">A</div>
                <span class="text-2xl font-black tracking-tighter uppercase">Alpha<span class="text-indigo-600">Forum</span></span>
            </div>

            <div class="flex items-center space-x-4">
                <template x-if="!user">
                    <button @click="authMode = 'login'; showAuthModal = true" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition">Войти</button>
                </template>
                <template x-if="user">
                    <div class="flex items-center space-x-4">
                        <span class="text-sm font-bold text-slate-900 bg-slate-100 px-4 py-2 rounded-full" x-text="'@' + user.name"></span>
                        <button @click="logout()" class="text-xs font-bold text-red-500 uppercase tracking-widest">Выйти</button>
                    </div>
                </template>
                <button @click="openCreateTopic()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-xl shadow-indigo-100 transition-all">
                    Создать тему
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10 flex flex-col lg:flex-row gap-8">
        <aside class="lg:w-1/4 space-y-4">
            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 ml-4 mb-2 text-left">Категории</h3>
            <nav class="space-y-1">
                <template x-for="cat in categories">
                    <button @click="activeCategory = cat; view = 'list'" 
                            :class="activeCategory === cat ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'bg-white text-slate-600 hover:bg-slate-50'"
                            class="w-full text-left px-6 py-4 rounded-2xl font-bold text-sm transition-all flex justify-between items-center">
                        <span x-text="cat"></span>
                    </button>
                </template>
            </nav>
        </aside>

        <section class="lg:w-3/4">
            <div x-show="view === 'list'" class="space-y-4 text-left">
                <h2 class="text-4xl font-black tracking-tighter mb-8" x-text="activeCategory"></h2>
                <template x-for="topic in filteredTopics" :key="topic.id">
                    <div @click="openTopic(topic)" class="bg-white p-8 rounded-[2.5rem] forum-card cursor-pointer">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[10px] font-black uppercase text-indigo-500 mb-2 block" x-text="topic.category"></span>
                                <h3 class="text-2xl font-extrabold text-slate-900 mb-3" x-text="topic.title"></h3>
                                <p class="text-sm font-bold text-slate-400">Автор: <span class="text-slate-900" x-text="topic.author"></span> • <span x-text="topic.date"></span></p>
                            </div>
                            <div class="bg-slate-50 px-4 py-2 rounded-xl text-xs font-black text-slate-400" x-text="topic.replies.length + ' ОТВЕТОВ'"></div>
                        </div>
                    </div>
                </template>
            </div>

            <div x-show="view === 'detail'" x-cloak class="text-left">
                <button @click="view = 'list'" class="mb-6 text-sm font-bold text-indigo-600 uppercase tracking-widest flex items-center">← Назад</button>
                <div class="bg-white rounded-[3rem] p-10 shadow-sm border border-slate-100 mb-6">
                    <h2 class="text-4xl font-black tracking-tight mb-10 text-slate-900 border-b pb-8" x-text="selectedTopic?.title"></h2>
                    <div class="space-y-8">
                        <template x-for="reply in selectedTopic?.replies">
                            <div class="flex gap-6">
                                <div class="w-12 h-12 bg-indigo-100 rounded-2xl flex-shrink-0 flex items-center justify-center font-black text-indigo-600" x-text="reply.author[0].toUpperCase()"></div>
                                <div>
                                    <div class="flex items-center space-x-3 mb-1">
                                        <span class="font-black text-slate-900" x-text="reply.author"></span>
                                        <span class="text-xs text-slate-400" x-text="reply.date"></span>
                                    </div>
                                    <p class="text-slate-600 leading-relaxed" x-text="reply.text"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm">
                    <template x-if="user">
                        <div>
                            <textarea x-model="newReply" class="w-full bg-slate-50 border-none rounded-2xl p-6 focus:ring-2 focus:ring-indigo-500 mb-4" placeholder="Ваше сообщение..." rows="3"></textarea>
                            <button @click="addReply()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black w-full hover:bg-indigo-600 transition">Отправить</button>
                        </div>
                    </template>
                    <template x-if="!user">
                        <div class="text-center py-4">
                            <p class="text-slate-400 font-bold mb-4">Чтобы отвечать, нужно войти в систему</p>
                            <button @click="authMode = 'login'; showAuthModal = true" class="text-indigo-600 font-black border-b-2 border-indigo-600">Войти или Создать аккаунт</button>
                        </div>
                    </template>
                </div>
            </div>
        </section>
    </main>

    <div x-show="showAuthModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-sm" x-cloak>
        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl relative">
            <h3 class="text-3xl font-black text-slate-900 mb-2" x-text="authMode === 'login' ? 'С возвращением' : 'Регистрация'"></h3>
            <p class="text-slate-400 text-sm font-bold mb-8" x-text="authMode === 'login' ? 'Войдите в свой аккаунт' : 'Присоединяйтесь к сообществу'"></p>
            
            <div class="space-y-4">
                <input x-model="authForm.name" type="text" placeholder="Имя пользователя" class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 font-bold">
                <input x-model="authForm.pass" type="password" placeholder="Пароль" class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 font-bold">
                <button @click="handleAuth()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl" x-text="authMode === 'login' ? 'Войти' : 'Создать аккаунт'"></button>
                <button @click="authMode = authMode === 'login' ? 'reg' : 'login'" class="w-full text-slate-400 font-bold text-sm" x-text="authMode === 'login' ? 'Нет аккаунта? Регистрация' : 'Уже есть аккаунт? Войти'"></button>
            </div>
            <button @click="showAuthModal = false" class="absolute top-8 right-8 text-slate-300 hover:text-slate-900 transition">✕</button>
        </div>
    </div>

    <div x-show="showCreateModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-sm" x-cloak>
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-10 shadow-2xl relative text-left">
            <h3 class="text-3xl font-black text-slate-900 mb-8">Новое обсуждение</h3>
            <div class="space-y-4">
                <input x-model="newTopicData.title" type="text" placeholder="Заголовок темы" class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 font-bold text-lg text-slate-900">
                <select x-model="newTopicData.cat" class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 font-bold text-slate-900">
                    <template x-for="cat in categories.filter(c => c !== 'Все темы')">
                        <option :value="cat" x-text="cat"></option>
                    </template>
                </select>
                <button @click="createTopic()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl">Опубликовать</button>
            </div>
            <button @click="showCreateModal = false" class="absolute top-8 right-8 text-slate-300 hover:text-slate-900 transition">✕</button>
        </div>
    </div>

    <script>
        function forumSystem() {
            return {
                view: 'list',
                user: null,
                showAuthModal: false,
                authMode: 'login',
                showCreateModal: false,
                activeCategory: 'Все темы',
                selectedTopic: null,
                newReply: '',
                authForm: { name: '', pass: '' },
                newTopicData: { title: '', cat: 'Общее' },
                
                categories: ['Все темы', 'Общее', 'Разработка', 'Идеи', 'Помощь'],
                topics: [
                    { id: 1, title: 'Правила нашего сообщества', category: 'Общее', author: 'Admin', date: '26.02.2026', replies: [{ author: 'Admin', text: 'Соблюдайте вежливость!', date: '12:00' }] },
                    { id: 2, title: 'Как создать крутой UI?', category: 'Разработка', author: 'DesignHero', date: '25.02.2026', replies: [{ author: 'DesignHero', text: 'Используйте Tailwind!', date: '15:00' }] }
                ],

                initApp() {
                    const savedUser = localStorage.getItem('forum_user');
                    if (savedUser) this.user = JSON.parse(savedUser);
                },

                get filteredTopics() {
                    return this.activeCategory === 'Все темы' ? this.topics : this.topics.filter(t => t.category === this.activeCategory);
                },

                handleAuth() {
                    if (!this.authForm.name || !this.authForm.pass) return alert('Заполните поля');
                    this.user = { name: this.authForm.name };
                    localStorage.setItem('forum_user', JSON.stringify(this.user));
                    this.showAuthModal = false;
                    this.authForm = { name: '', pass: '' };
                },

                logout() {
                    this.user = null;
                    localStorage.removeItem('forum_user');
                },

                openCreateTopic() {
                    if (!this.user) {
                        this.authMode = 'login';
                        this.showAuthModal = true;
                    } else {
                        this.showCreateModal = true;
                    }
                },

                createTopic() {
                    if (!this.newTopicData.title) return;
                    this.topics.unshift({
                        id: Date.now(),
                        title: this.newTopicData.title,
                        category: this.newTopicData.cat,
                        author: this.user.name,
                        date: 'Сегодня',
                        replies: [{ author: this.user.name, text: 'Тема открыта для обсуждения.', date: 'Только что' }]
                    });
                    this.showCreateModal = false;
                    this.newTopicData.title = '';
                },

                openTopic(topic) {
                    this.selectedTopic = topic;
                    this.view = 'detail';
                },

                addReply() {
                    if (!this.newReply.trim()) return;
                    this.selectedTopic.replies.push({
                        author: this.user.name,
                        text: this.newReply,
                        date: 'Только что'
                    });
                    this.newReply = '';
                }
            }
        }
    </script>
</body>
</html>
