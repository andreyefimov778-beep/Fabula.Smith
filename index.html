<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA CORE | Ultimate Forum System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #1e293b; }
        [x-cloak] { display: none !important; }
        .forum-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .forum-card:hover { border-color: #4f46e5; transform: translateY(-2px); box-shadow: 0 10px 30px -10px rgba(79, 70, 229, 0.1); }
        .admin-tag { background: linear-gradient(90deg, #ef4444, #f97316); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="forumCore()" x-init="initApp()">

    <template x-if="!currentUser">
        <div class="min-h-screen flex items-center justify-center bg-slate-900 p-6">
            <div class="bg-white w-full max-w-md rounded-[3rem] p-12 shadow-2xl animate-fade-in">
                <div class="flex justify-center mb-8">
                    <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-3xl font-black shadow-lg shadow-indigo-200">A</div>
                </div>
                <div class="flex p-1 bg-slate-100 rounded-2xl mb-8">
                    <button @click="authMode = 'login'" :class="authMode === 'login' ? 'bg-white shadow-sm' : 'opacity-40'" class="flex-1 py-3 rounded-xl font-bold text-sm transition-all">Вход</button>
                    <button @click="authMode = 'reg'" :class="authMode === 'reg' ? 'bg-white shadow-sm' : 'opacity-40'" class="flex-1 py-3 rounded-xl font-bold text-sm transition-all">Регистрация</button>
                </div>
                <div class="space-y-4">
                    <input x-model="authForm.login" type="text" placeholder="Ваш логин" class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition">
                    <input x-model="authForm.pass" type="password" placeholder="Пароль" class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition">
                    <button @click="handleAuth()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-indigo-700 transition" x-text="authMode === 'login' ? 'Войти' : 'Создать аккаунт'"></button>
                    <p x-show="errorMsg" x-text="errorMsg" class="text-red-500 text-xs font-bold text-center mt-2"></p>
                </div>
            </div>
        </div>
    </template>

    <template x-if="currentUser">
        <div class="min-h-screen">
            <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 px-6">
                <div class="max-w-7xl mx-auto h-20 flex justify-between items-center">
                    <div class="flex items-center space-x-3 cursor-pointer" @click="view = 'list'">
                        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black">A</div>
                        <span class="text-xl font-black tracking-tighter uppercase">Alpha<span class="text-indigo-600">Core</span></span>
                    </div>

                    <div class="flex items-center space-x-6">
                        <div @click="view = 'profile'" class="flex items-center space-x-3 cursor-pointer hover:opacity-70 transition">
                            <div class="text-right leading-none hidden sm:block">
                                <p class="text-sm font-black text-slate-900" x-text="currentUser.login"></p>
                                <p class="text-[9px] font-bold uppercase tracking-widest text-indigo-500" x-text="currentUser.role"></p>
                            </div>
                            <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center font-black border-2 border-white shadow-sm" x-text="currentUser.login[0].toUpperCase()"></div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="max-w-7xl mx-auto p-6 flex flex-col lg:flex-row gap-8">
                <aside class="lg:w-1/4 space-y-6">
                    <button @click="showCreateModal = true" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black shadow-xl hover:bg-indigo-600 transition shadow-indigo-100">+ Новая тема</button>
                    
                    <nav class="bg-white p-4 rounded-[2rem] border border-slate-200 shadow-sm space-y-1">
                        <p class="text-[10px] font-bold uppercase text-slate-400 px-4 mb-2 tracking-widest">Категории</p>
                        <template x-for="cat in categories">
                            <button @click="activeCat = cat; view = 'list'" 
                                    :class="activeCat === cat ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50'"
                                    class="w-full text-left px-5 py-3 rounded-xl font-bold text-sm transition-all flex justify-between">
                                <span x-text="cat"></span>
                            </button>
                        </template>
                    </nav>

                    <div class="bg-indigo-600 rounded-[2rem] p-8 text-white shadow-2xl shadow-indigo-200">
                        <h4 class="text-xs font-bold uppercase tracking-widest opacity-60 mb-4">Статистика</h4>
                        <div class="grid grid-cols-2 gap-4">
                            <div><p class="text-2xl font-black" x-text="topics.length"></p><p class="text-[10px] font-bold opacity-60 uppercase">Темы</p></div>
                            <div><p class="text-2xl font-black" x-text="Object.keys(usersDB).length"></p><p class="text-[10px] font-bold opacity-60 uppercase">Люди</p></div>
                        </div>
                    </div>
                </aside>

                <section class="lg:w-3/4">
                    
                    <div x-show="view === 'list'" class="space-y-4 text-left">
                        <h2 class="text-3xl font-black tracking-tighter mb-8" x-text="activeCat"></h2>
                        <template x-for="topic in filteredTopics" :key="topic.id">
                            <div @click="openTopic(topic)" class="forum-card p-8 cursor-pointer relative group">
                                <div class="flex justify-between items-start">
                                    <div class="flex-1">
                                        <div class="flex items-center space-x-3 mb-2">
                                            <span class="text-[9px] font-black px-2 py-0.5 bg-slate-100 text-slate-500 rounded uppercase" x-text="topic.category"></span>
                                            <template x-if="topic.role === 'admin'"><span class="text-[9px] font-black admin-tag text-white px-2 py-0.5 rounded uppercase tracking-tighter">Официально</span></template>
                                        </div>
                                        <h3 class="text-2xl font-black text-slate-900 group-hover:text-indigo-600 transition mb-3" x-text="topic.title"></h3>
                                        <div class="flex items-center space-x-4 text-xs font-bold text-slate-400 uppercase tracking-tighter">
                                            <span>Автор: <span class="text-slate-900" x-text="topic.author"></span></span>
                                            <span>•</span>
                                            <span x-text="topic.date"></span>
                                        </div>
                                    </div>
                                    <div class="flex flex-col items-end gap-3">
                                        <div class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-xs font-black" x-text="topic.replies.length + ' ответов'"></div>
                                        <template x-if="currentUser.role === 'admin'">
                                            <button @click.stop="deleteTopic(topic.id)" class="text-red-300 hover:text-red-500 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div x-show="view === 'detail'" class="text-left" x-cloak>
                        <button @click="view = 'list'" class="mb-6 font-black text-indigo-600 text-xs tracking-widest uppercase flex items-center">← назад в ленту</button>
                        <div class="bg-white rounded-[3rem] p-10 border border-slate-200 shadow-sm mb-6">
                            <h2 class="text-4xl font-black text-slate-900 mb-10 pb-10 border-b border-slate-50" x-text="selectedTopic?.title"></h2>
                            <div class="space-y-8">
                                <template x-for="(reply, idx) in selectedTopic?.replies">
                                    <div class="flex gap-6 animate-fade-in">
                                        <div class="w-14 h-14 bg-slate-100 rounded-2xl flex-shrink-0 flex items-center justify-center font-black text-xl text-slate-400" x-text="reply.author[0].toUpperCase()"></div>
                                        <div class="flex-1">
                                            <div class="flex items-center justify-between mb-2">
                                                <div class="flex items-center space-x-2">
                                                    <span class="
